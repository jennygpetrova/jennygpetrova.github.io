<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <!-- Define background colors -->
  <defs>
    <style>
      .blue-bg { fill: #d6e8f7; }
      .red-bg { fill: #f4d6d6; }
      .green-bg { fill: #d6f7d6; }
      .yellow-bg { fill: #f7f4d6; }
      .gray-bg { fill: #e8e8e8; }
      .node { fill: none; stroke: #333; stroke-width: 2; }
      .edge { stroke: #999; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- Background clusters -->
  <ellipse cx="150" cy="150" rx="120" ry="130" class="blue-bg"/>
  <ellipse cx="500" cy="200" rx="140" ry="150" class="red-bg"/>
  <ellipse cx="700" cy="120" rx="80" ry="100" class="gray-bg"/>
  <ellipse cx="250" cy="300" rx="90" ry="80" class="green-bg"/>
  <ellipse cx="450" cy="350" rx="100" ry="70" class="yellow-bg"/>

  <!-- Edges for blue cluster -->
  <line x1="100" y1="100" x2="150" y2="150" class="edge"/>
  <line x1="100" y1="150" x2="160" y2="120" class="edge"/>
  <line x1="150" y1="100" x2="190" y2="150" class="edge"/>
  <line x1="150" y1="200" x2="190" y2="180" class="edge"/>
  <line x1="120" y1="200" x2="180" y2="220" class="edge"/>
  <line x1="100" y1="100" x2="150" y2="200" class="edge"/>
  <line x1="190" y1="150" x2="160" y2="120" class="edge"/>
  <line x1="120" y1="200" x2="160" y2="120" class="edge"/>

  <!-- Edges for red/central cluster (large) -->
  <line x1="420" y1="160" x2="480" y2="140" class="edge"/>
  <line x1="480" y1="140" x2="540" y2="150" class="edge"/>
  <line x1="540" y1="150" x2="560" y2="220" class="edge"/>
  <line x1="560" y1="220" x2="500" y2="280" class="edge"/>
  <line x1="500" y1="280" x2="440" y2="260" class="edge"/>
  <line x1="440" y1="260" x2="420" y2="160" class="edge"/>
  <line x1="480" y1="140" x2="560" y2="220" class="edge"/>
  <line x1="540" y1="150" x2="440" y2="260" class="edge"/>
  <line x1="500" y1="280" x2="480" y2="140" class="edge"/>
  <line x1="420" y1="160" x2="560" y2="220" class="edge"/>
  <line x1="520" y1="100" x2="480" y2="140" class="edge"/>
  <line x1="520" y1="100" x2="540" y2="150" class="edge"/>
  <line x1="480" y1="320" x2="500" y2="280" class="edge"/>
  <line x1="480" y1="320" x2="440" y2="260" class="edge"/>

  <!-- Edges for gray cluster (right) -->
  <line x1="670" y1="80" x2="710" y2="120" class="edge"/>
  <line x1="710" y1="120" x2="740" y2="140" class="edge"/>
  <line x1="740" y1="140" x2="720" y2="100" class="edge"/>
  <line x1="670" y1="80" x2="740" y2="140" class="edge"/>

  <!-- Edges for green cluster (bottom left) -->
  <line x1="220" y1="280" x2="270" y2="290" class="edge"/>
  <line x1="270" y1="290" x2="280" y2="330" class="edge"/>
  <line x1="220" y1="280" x2="280" y2="330" class="edge"/>

  <!-- Edges for yellow cluster (bottom) -->
  <line x1="420" y1="330" x2="480" y2="320" class="edge"/>
  <line x1="480" y1="320" x2="520" y2="360" class="edge"/>
  <line x1="420" y1="360" x2="480" y2="320" class="edge"/>
  <line x1="420" y1="360" x2="520" y2="360" class="edge"/>

  <!-- Connecting edges between clusters -->
  <line x1="190" y1="200" x2="250" y2="300" class="edge" stroke="#ccc"/>
  <line x1="250" y1="300" x2="420" y2="330" class="edge" stroke="#ccc"/>
  <line x1="190" y1="150" x2="420" y2="160" class="edge" stroke="#ccc"/>
  <line x1="560" y1="220" x2="670" y2="120" class="edge" stroke="#ccc"/>
  <line x1="540" y1="150" x2="670" y2="100" class="edge" stroke="#ccc"/>

  <!-- Nodes for blue cluster -->
  <circle cx="100" cy="100" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="150" cy="100" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="190" cy="150" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="160" cy="120" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="100" cy="150" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="120" cy="200" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="150" cy="200" r="12" class="node" fill="#5a8cc4"/>
  <circle cx="180" cy="220" r="12" class="node" fill="#5a8cc4"/>

  <!-- Nodes for red/central cluster -->
  <circle cx="420" cy="160" r="12" class="node" fill="#d84a4a"/>
  <circle cx="480" cy="140" r="12" class="node" fill="#d84a4a"/>
  <circle cx="540" cy="150" r="12" class="node" fill="#d84a4a"/>
  <circle cx="560" cy="220" r="12" class="node" fill="#d84a4a"/>
  <circle cx="500" cy="280" r="12" class="node" fill="#d84a4a"/>
  <circle cx="440" cy="260" r="12" class="node" fill="#d84a4a"/>
  <circle cx="520" cy="100" r="12" class="node" fill="#d84a4a"/>
  <circle cx="480" cy="320" r="12" class="node" fill="#d84a4a"/>

  <!-- Nodes for gray cluster -->
  <circle cx="670" cy="80" r="12" class="node" fill="#888"/>
  <circle cx="710" cy="120" r="12" class="node" fill="#888"/>
  <circle cx="740" cy="140" r="12" class="node" fill="#888"/>
  <circle cx="720" cy="100" r="12" class="node" fill="#888"/>

  <!-- Nodes for green cluster -->
  <circle cx="220" cy="280" r="12" class="node" fill="#5cb85c"/>
  <circle cx="270" cy="290" r="12" class="node" fill="#5cb85c"/>
  <circle cx="280" cy="330" r="12" class="node" fill="#5cb85c"/>

  <!-- Nodes for yellow cluster -->
  <circle cx="420" cy="330" r="12" class="node" fill="#f0c959"/>
  <circle cx="480" cy="320" r="12" class="node" fill="#f0c959"/>
  <circle cx="520" cy="360" r="12" class="node" fill="#f0c959"/>
  <circle cx="430" cy="360" r="12" class="node" fill="#f0c959"/>
</svg>